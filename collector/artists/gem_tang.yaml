categories:
  - id: 2
    key: "personal_mv"
    label: "個人MV"
    sub: "Official MV & Lyric Video"
    output_path: "MV/个人MV.md"
    description: "按专辑分组，每首MV一行，含：歌名、链接、平台、发布日期、播放量、导演/频道、简介。"
  - id: 3
    key: "ost_singles"
    label: "影視單曲"
    sub: "OST & Singles"
    output_path: "歌曲与合作/影视单曲.md"
    description: "影视主题曲、官方数字单曲等非专辑收录作品。"
  - id: 4
    key: "concerts"
    label: "演唱會"
    sub: "Concert & Live"
    output_path: "演唱会/演唱会.md"
    description: "个人演唱会，区分官方影像、现场录像、精彩片段。"
  - id: 5
    key: "variety"
    label: "綜藝節目"
    sub: "TV Shows & Variety"
    output_path: "节目与访谈/综艺节目.md"
    description: "按节目分组：我是歌手（逐期）、中国新说唱、其他综艺、历史片段。每条注明原唱。"
  - id: 6
    key: "interviews"
    label: "採訪訪談"
    sub: "Interviews & Press"
    output_path: "节目与访谈/采访访谈.md"
    description: "专访、采访、金曲奖访谈等。"
  - id: 8
    key: "collabs"
    label: "合唱合作"
    sub: "Collabs & Features"
    output_path: "歌曲与合作/合唱合作.md"
    description: "与其他歌手的合唱、合作视频。"

classification:
